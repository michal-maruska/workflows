name: Build and Release Debian Package
on:
  workflow_call:
    inputs:
      apt_repo:
        description: 'The apt repository (e.g. michal-maruska/apt-repo)'
        required: true
        type: string

permissions:
  contents: write
  packages: write # Optional, but good if you use GHCR

jobs:
  build:
    # We still use an Ubuntu runner to host the Docker engine
    runs-on: ubuntu-latest

    container:
      # this is what we build for: SID
      image:  ghcr.io/${{ github.repository_owner }}/debian-builder:main
      # for now the image is not public ...
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: main
          # mmc: full.
          # todo: up to previous tag
          fetch-depth: 0 # Get all history for tagging

      - name: Install dependencies
        run: |
          apt-get update
          # 3. Install build-deps (this still needs root)
          # We use mk-build-deps to create a dummy package of dependencies
          mk-build-deps -ir -t "apt-get -y --no-install-recommends"

          #sudo mk-build-deps -i debian/control \
          #  --tool="apt-get -y --no-install-recommends"
          rm -f *-build-deps_*.deb

      - name: Update Changelog (dch)
        env:
          DEBEMAIL: "mmaruska+deb@gmail.com"
          DEBFULLNAME: "Michal Maruska"
        run: |
          # mess with permissions/ownership: actions/checkout works outside the container
          # su builder -c "git config --global --add safe.directory ."
          # 2. Fix permissions (GitHub Actions mounts the repo as root)
          chown -R builder:builder .
          # --snapshot: creates a temporary version (useful for CI)
          # --release: prepares it for a real release
          # --auto: tries to guess the next version number based on tags
          su builder -c "gbp --list-cmds"
          su builder -c "which dch"
          su builder -c "gbp dch --release --auto --debian-branch=main --spawn-editor=never"


      - name: Build Debian package
        run: |
          chown builder ../
          su builder -c "dpkg-buildpackage -us -uc"
          su builder -c "mkdir -p /tmp/debs"
          su builder -c "dcmd mv ../*.changes /tmp/debs/ 2>/dev/null || true"

      - name: Extract Version and Tag
        id: meta
        run: |
          # Extract the version string (e.g., 1.2.3-1)
          VERSION=$(dpkg-parsechangelog -S Version)
          DISTRIBUTION=$(dpkg-parsechangelog -S Distribution)
          TAG_NAME="$DISTRIBUTION/$VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

          # Configure git to push the tag
          # git config user.name "github-actions[bot]"
          # git config user.email "github-actions[bot]@users.noreply.github.com"
          # # Commit the changelog change, tag it, and push
          # git add debian/changelog
          # git commit -m "Release $TAG_NAME"
          # git tag "$TAG_NAME"
          # git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.TAG_NAME }}
          files: /tmp/debs/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Trigger Apt-Manager
      #   run: |
      #     # Notify the hosting repo to pull this specific tag
      #     curl -L \
      #       -X POST \
      #       -H "Accept: application/vnd.github+json" \
      #       -H "Authorization: Bearer ${{ secrets.MY_PAT }}" \
      #       https://api.github.com/repos/OWNER/APT_MANAGER_REPO/dispatches \
      #       -d "{\"event_type\": \"new_release\", \"client_payload\": {\"tag\": \"${{ steps.meta.outputs.TAG_NAME }}\", \"repo\": 
      #            \"${{ github.repository }}\"}}"
