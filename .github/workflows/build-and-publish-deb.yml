name: Build and Release Debian Package
on:
  workflow_call:
    inputs:
      apt_repo:
        description: 'The apt repository (e.g. maruska/apt-repo)'
        required: true
        type: string
    secrets:
      GPG_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  packages: write # Optional, but good if you use GHCR

jobs:
  build:
    # We still use an Ubuntu runner to host the Docker engine
    runs-on: ubuntu-latest

    container:
      # this is what we build for: SID
      image: debian:unstable-slim

    steps:
      - name: install git
        run: |
          apt-get update
          apt-get install -y git

      - name: Checkout source
        uses: actions/checkout@v4

        with:
          ref: main
          # mmc: full.
          # up to previous tag
          fetch-depth: 0 # Get all history for tagging

      - name: Install dependencies
        run: |
          apt-get install -y devscripts equivs git-buildpackage

          # 1. Create a build user
          useradd -m builder
          # 2. Fix permissions (GitHub Actions mounts the repo as root)
          chown -R builder:builder .
          # 3. Install build-deps (this still needs root)
          # We use mk-build-deps to create a dummy package of dependencies
          mk-build-deps -ir -t "apt-get -y --no-install-recommends"

          #sudo mk-build-deps -i debian/control \
          #  --tool="apt-get -y --no-install-recommends"
          rm -f *-build-deps_*.deb

      - name: Update Changelog (dch)
        env:
          DEBEMAIL: "mmaruska+deb@gmail.com"
          DEBFULLNAME: "Michal Maruska"
        run: |
          # --snapshot: creates a temporary version (useful for CI)
          # --release: prepares it for a real release
          # --auto: tries to guess the next version number based on tags
          gbp dch --release --auto --debian-branch=main --spawn-editor=never

      - name: Build Debian package
        run: |
          # su builder -c "dpkg-buildpackage -us -uc -b"
          dpkg-buildpackage -us -uc
          mkdir -p /tmp/debs
          mv ../*.deb ../*.changes ../*.dsc ../*.tar.* /tmp/debs/ 2>/dev/null || true

      - name: Extract Version and Tag
        id: meta
        run: |
          # Extract the version string (e.g., 1.2.3-1)
          VERSION=$(dpkg-parsechangelog -S Version)
          DISTRIBUTION=$(dpkg-parsechangelog -S Distribution)
          TAG_NAME="$DISTRIBUTION/$VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v1
          files: |
            /tmp/debs/*.deb
            /tmp/debs/*.changes
            /tmp/debs/*.dsc
