name: Build and Publish Debian Package

on:
  workflow_call:
    inputs:
      apt_repo:
        description: 'The apt repository (e.g. maruska/apt-repo)'
        required: true
        type: string
    secrets:
      GPG_PRIVATE_KEY:
        required: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts equivs
          sudo mk-build-deps -i debian/control \
            --tool="apt-get -y --no-install-recommends"
          sudo rm -f *-build-deps_*.deb

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          GPG_FINGERPRINT=$(gpg --list-secret-keys --with-colons | \
            awk -F: '/^fpr/{print $10; exit}')
          echo "$GPG_FINGERPRINT:6:" | gpg --import-ownertrust

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc
          mkdir -p /tmp/debs
          mv ../*.deb ../*.changes ../*.dsc ../*.tar.* /tmp/debs/ 2>/dev/null || true

