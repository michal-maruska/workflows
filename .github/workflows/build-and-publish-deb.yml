name: Build and Release Debian Package
on:
  workflow_call:
    inputs:
      apt_repo:
        description: 'The apt repository (e.g. michal-maruska/apt-repo)'
        type: string
        default: "michal-maruska/apt-repo"
      ref:
        description: 'Branch, tag or SHA to checkout'
        type: string
        default: 'main'
      architectures:
        description: 'Architectures to build for'
        type: string
        default: 'amd64'  # or 'amd64,arm64'
    secrets:
      PAT_TOKEN:
        required: true

permissions:
  contents: write
  packages: write # Optional, but good if you use GHCR

jobs:

  update-changelog:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      arch_all_only: ${{ steps.archcheck.outputs.arch_all_only }}
    container:
      # this is what we build for: SID
      image:  ghcr.io/${{ github.repository_owner }}/debian-builder:main
      # for now the image is not public ...
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Update Changelog (dch)
        env:
          DEBEMAIL: "mmaruska+deb@gmail.com"
          DEBFULLNAME: "Michal Maruska"
        run: |
          # mess with permissions/ownership: actions/checkout works outside the container
          # su builder -c "git config --global --add safe.directory ."
          # 2. Fix permissions (GitHub Actions mounts the repo as root)
          chown -R builder:builder .
          # --snapshot: creates a temporary version (useful for CI)
          # --release: prepares it for a real release
          # --auto: tries to guess the next version number based on tags
          # su builder -c "gbp --list-cmds"
          # su builder -c "which dch"
          su builder -c "gbp dch --release --auto --ignore-branch --spawn-editor=never"

      - name: Extract Version and Tag
        id: version
        run: |
          # Extract the version string (e.g., 1.2.3-1)
          VERSION=$(dpkg-parsechangelog -S Version)
          # cannot use :
          SAFE_VERSION=$(echo "$VERSION" | sed 's/:/_epoch/g; s/~/_/g')
          DISTRIBUTION=$(dpkg-parsechangelog -S Distribution)
          TAG_NAME="$DISTRIBUTION/$SAFE_VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Determine if this package needs an arch-specific build
        id: archcheck
        run: |
          archs=$(awk '/^Architecture:/{print $2}' debian/control | sort -u | tr '\n' ' ')
                  archs=$(echo "$archs" | sed 's/[[:space:]]*$//')
          echo "archs: $archs"
          if [ "$archs" = "all" ]; then
               echo "arch_all_only=true" >> "$GITHUB_OUTPUT"
          else
               echo "arch_all_only=false" >> "$GITHUB_OUTPUT"
          fi

  build-amd64-and-indep:
    needs: update-changelog
    runs-on: ubuntu-latest
    container:
      # this is what we build for: SID
      image:  ghcr.io/${{ github.repository_owner }}/debian-builder:main
      # for now the image is not public ...
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          # mmc: full.
          # todo: up to previous tag
          fetch-depth: 0 # Get all history for tagging

      - name: Install dependencies
        run: |
          apt-get update
          # 3. Install build-deps (this still needs root)
          mk-build-deps --install --remove --tool="apt-get -y --no-install-recommends" debian/control
          # rm -f *-build-deps_*.deb

      # inside docker:
      - name: fix permissions
        run: |
          chown --recursive builder:builder ../

      - name: Build arch-independent
        run: |
          if grep -q "^Architecture: all" debian/control; then
            su builder -c "dpkg-buildpackage -us -uc -A"
            su builder -c "mkdir -p /tmp/debs"
            su builder -c "dcmd mv ../*.changes /tmp/debs/ 2>/dev/null || true"
          else
            echo "No arch-independent packages, skipping"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-indep
          path: /tmp/debs/

      - name: Build Debian package
        if: contains(fromJson(inputs.architectures), 'amd64')
        run: |
          su builder -c "dpkg-buildpackage -us -uc -B"
          su builder -c "mkdir -p /tmp/debs"
          su builder -c "dcmd mv ../*.changes /tmp/debs/ 2>/dev/null || true"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-amd64
          path: /tmp/debs/
            # ${{ github.workspace }}/../*.deb

  build-arm64:
    needs: update-changelog
    if: contains(fromJson(inputs.architectures), 'arm64')
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      # we invoke directly dpkg-buildpackage, no gbp ...
      # dpkg-buildpackage -B  (arch-dependent only)
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          # let's try:  we do rm -rf ourselves.... and making the repo safe?? todo!
          clean: false
          set-safe-directory: false

      - name: debspawn build
        if: needs.update-changelog.outputs.arch_all_only != 'true'
        run: |
          debspawn --verbose build  -a arm64 --suite sid --only arch --results-dir  ${{ github.workspace }}/results sid .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-arm64
          path: ${{ github.workspace }}/results/*
          # .deb

      - name: Cleanup
        if: always()
        run: |
          : "${GITHUB_WORKSPACE:?GITHUB_WORKSPACE is not set or empty}"
          set -u   # treat unset variables as errors
          find "${GITHUB_WORKSPACE}" -mindepth 1 -delete

  release:
    needs: [update-changelog, build-amd64-and-indep, build-arm64]
    if: |
      always()
      && (needs.build-arm64.result == 'success' || needs.build-arm64.result == 'skipped')
      && !cancelled()

    runs-on: ubuntu-latest
    # create GitHub release with all debs
    steps:
      - name: Download amd64 artifacts
        if: contains(fromJson(inputs.architectures), 'amd64') && needs.update-changelog.outputs.arch_all_only != 'true'
        uses: actions/download-artifact@v4
        with:
          name: debs-amd64
          path: /tmp/debs/
        continue-on-error: true

      - name: Download arm64 artifacts
        if: contains(fromJson(inputs.architectures), 'arm64') && needs.update-changelog.outputs.arch_all_only != 'true'
        uses: actions/download-artifact@v4
        with:
          name: debs-arm64
          path: /tmp/debs/
        continue-on-error: true


      - name: Download arch-indep artifacts
        uses: actions/download-artifact@v4
        with:
          name: debs-indep
          path: /tmp/debs/
        continue-on-error: true

      - name: List downloaded files
        run: |
            echo "Files in /tmp/debs/:"
              ls -la /tmp/debs/
            echo "---"
            find /tmp/debs/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.update-changelog.outputs.tag_name }}
          files: /tmp/debs/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-apt-repo:
    runs-on: ubuntu-latest
    needs: [update-changelog, release]
    if: |
      always()
      && needs.update-changelog.result == 'success'
      && (needs.release.result == 'success')

    # trigger apt-repo dispatch
    steps:
      - name: Notify apt-repository
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh api repos/${{ inputs.apt_repo }}/dispatches \
          --method POST \
          --field event_type=new-deb-package \
          --field client_payload[repository]=${{ github.repository }} \
          --field client_payload[run_id]=${{ github.run_id }} \
          --field client_payload[version]=${{ needs.update-changelog.outputs.tag_name }}

          echo "::notice::Triggered apt-repo: https://github.com/${{ inputs.apt_repo }}/actions"
